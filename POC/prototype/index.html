<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>那个谁 · 军训篇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a1a;--text:#e8e0d4;--accent:#c4956a;--dim:#666;--dimmer:#444}
html,body{width:100%;height:100%;overflow:hidden;font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
body{background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
#game{width:100%;height:100%;position:relative;overflow:hidden}
.scene{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
.scene.active{display:flex}
.fade-in{animation:fadeIn .8s ease forwards}
.fade-out{animation:fadeOut .8s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes typeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes sunPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.08);opacity:1}}
@keyframes walkCycle{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}

/* ---- SOUND TOGGLE ---- */
#sound-toggle{position:fixed;top:12px;right:12px;z-index:999;width:40px;height:40px;border-radius:50%;background:rgba(40,40,40,.8);border:1px solid var(--dimmer);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;font-size:1.2em;line-height:1}
#sound-toggle:hover{background:rgba(60,60,60,.9);border-color:var(--accent)}
#sound-toggle .icon-on::before{content:'♪'}
#sound-toggle .icon-off::before{content:'✕';color:#885544}
#sound-toggle.muted{opacity:.5}

/* ---- EXPLORE HINT ---- */
#explore-hint{position:fixed;top:60px;left:12px;z-index:998;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .5s}
#explore-hint.show{opacity:.6}
#explore-hint.fade-out{opacity:0}
#explore-hint .eyes-container{display:flex;gap:4px;align-items:center}
#explore-hint .eye{width:12px;height:12px;border-radius:50%;background:var(--dim);position:relative;animation:blink 4s ease-in-out infinite}
#explore-hint .eye:nth-child(2){animation-delay:.1s}
#explore-hint .eye::after{content:'';position:absolute;width:5px;height:5px;background:var(--bg);border-radius:50%;top:3px;left:3.5px;animation:lookAround 5s ease-in-out infinite}
#explore-hint .eye:nth-child(2)::after{animation-delay:.3s}
#explore-hint .hint-countdown{font-size:.9em;color:var(--dim);min-width:22px;font-variant-numeric:tabular-nums}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
@keyframes lookAround{0%,100%{transform:translate(0,0)}20%{transform:translate(-2px,0)}40%{transform:translate(0,0)}60%{transform:translate(2px,0)}80%{transform:translate(0,0)}}

/* ---- BREATHING HINT FOR INTERACTIVE ELEMENTS ---- */
.scene-canvas [data-el]{animation:breathe 2.5s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.75}50%{opacity:1}}

/* ---- TITLE SCREEN ---- */
#title-screen{background:var(--bg);text-align:center}
#title-screen h1{font-size:2.2em;color:var(--accent);letter-spacing:.15em;margin-bottom:.3em;font-weight:300}
#title-screen .subtitle{font-size:1em;color:var(--dim);margin-bottom:1.5em;letter-spacing:.3em}
#title-screen .start-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:12px 48px;font-size:1.1em;cursor:pointer;letter-spacing:.2em;border-radius:2px;transition:all .3s}
#title-screen .start-btn:hover{background:var(--accent);color:var(--bg)}

/* ---- OPENING TEXT ---- */
#opening-screen{background:var(--bg);text-align:center;padding:2em;justify-content:flex-start;padding-top:12vh}
#opening-screen p{font-size:1.1em;line-height:2.2;color:var(--text);opacity:0}
#opening-screen p.show{animation:typeIn .8s ease forwards}

/* ---- TRANSITION ---- */
#transition-screen{background:var(--bg);text-align:center;padding:2em;justify-content:flex-start;padding-top:12vh}
#transition-screen p{font-size:1.15em;line-height:2.4;color:var(--dim);opacity:0}
#transition-screen p.show{animation:typeIn .6s ease forwards}

/* ---- COMMON BUBBLE ---- */
.bubble{position:absolute;background:rgba(50,50,50,.92);color:var(--text);padding:10px 16px;border-radius:12px;font-size:.85em;line-height:1.6;max-width:280px;text-align:center;pointer-events:none;opacity:0;transform:scale(.85);transition:all .35s;z-index:100;border:1px solid rgba(196,149,106,.25)}
.bubble.show{opacity:1;transform:scale(1)}
.bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(50,50,50,.92)}

/* ---- CHOICE OVERLAY ---- */
.choices{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);display:flex;flex-direction:row;gap:16px;z-index:200;opacity:0;transition:opacity .4s;flex-wrap:wrap;justify-content:center}
.choices.show{opacity:1}
.choices button{background:rgba(40,40,40,.95);border:1px solid var(--accent);color:var(--text);padding:10px 24px;font-size:.95em;cursor:pointer;border-radius:4px;min-width:140px;transition:all .25s;letter-spacing:.1em}
.choices button:hover{background:var(--accent);color:var(--bg)}

/* ---- NARRATION ---- */
.narration{position:absolute;top:8%;left:50%;transform:translateX(-50%);width:80%;max-width:700px;text-align:center;font-size:.9em;color:var(--dim);line-height:1.8;z-index:150;opacity:0;transition:opacity .5s}
.narration.show{opacity:1}

/* ---- SCENE CANVAS ---- */
.scene-canvas{position:relative;width:100%;height:100%;overflow:hidden}

/* ========== SCENE 1 ========== */
#scene1 .scene-canvas{background:linear-gradient(180deg,#2a2520 0%,#252520 35%,#3a3828 68%,#2e2c22 100%)}
/* 远景建筑轮廓 */
#scene1 .scene-canvas::before{content:'';position:absolute;bottom:28%;left:0;width:100%;height:30px;opacity:.35;background:linear-gradient(90deg,transparent 1%,#5a5548 1%,#5a5548 6%,transparent 6%,transparent 10%,#5a5548 10%,#5a5548 13%,transparent 13%,transparent 18%,#5a5548 18%,#5a5548 19%,transparent 19%,transparent 60%,#5a5548 60%,#5a5548 75%,transparent 75%,transparent 80%,#5a5548 80%,#5a5548 90%,transparent 90%)}
/* 地平线 */
#scene1 .scene-canvas::after{content:'';position:absolute;bottom:22%;left:0;width:100%;height:2px;background:rgba(196,149,106,.18)}
/* 蚂蚁 */
.ant{position:absolute;pointer-events:none}
.ant-body{width:4px;height:3px;background:var(--dim);border-radius:50%;position:relative}
.ant-body::before{content:'';position:absolute;width:3px;height:2.5px;background:var(--dim);border-radius:50%;left:-3.5px;top:0}
.ant-legs{position:absolute;top:2px;left:-2px;width:10px;height:4px}
.ant-legs::before{content:'';position:absolute;width:100%;height:100%;background:repeating-linear-gradient(90deg,transparent 0px,transparent 1.5px,var(--dim) 1.5px,var(--dim) 2px,transparent 2px,transparent 3.5px);opacity:.6}
.ant1{bottom:14%;left:-5%;animation:antWalk1 18s linear infinite}
.ant2{bottom:10%;left:-5%;animation:antWalk2 24s linear infinite 5s}
.ant3{bottom:17%;left:-5%;animation:antWalk3 15s linear infinite 10s}
@keyframes antWalk1{0%{transform:translateX(0)}100%{transform:translateX(calc(100vw + 20px))}}
@keyframes antWalk2{0%{transform:translateX(0)}60%{transform:translateX(55vw)}62%{transform:translateX(55vw) translateY(-2px)}64%{transform:translateX(55vw) translateY(0)}100%{transform:translateX(calc(100vw + 20px))}}
@keyframes antWalk3{0%{transform:translateX(0)}40%{transform:translateX(30vw)}42%{transform:translateX(30vw) rotate(8deg)}46%{transform:translateX(30vw) rotate(-5deg)}50%{transform:translateX(35vw) rotate(0deg)}100%{transform:translateX(calc(100vw + 20px))}}
.s1-sun{position:absolute;top:12%;right:10%;width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#e8c87a,#c4956a);box-shadow:0 0 30px rgba(196,149,106,.4);animation:sunPulse 4s ease infinite;cursor:pointer}
.s1-ground{position:absolute;bottom:0;left:0;width:100%;height:22%;background:linear-gradient(180deg,#3a3828,#2e2c22);cursor:pointer}
.s1-ground::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:rgba(196,149,106,.15)}
.s1-instructor{position:absolute;top:32%;left:12%;cursor:pointer}
.s1-instructor .head{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);margin:0 auto}
.s1-instructor .body-line{width:2px;height:36px;background:var(--dim);margin:0 auto}
.s1-instructor .arms{width:32px;height:2px;background:var(--dim);margin:-28px auto 0;position:relative}
.s1-instructor .legs{width:20px;height:2px;background:var(--dim);margin:22px auto 0}
.s1-instructor .leg-l,.s1-instructor .leg-r{width:2px;height:20px;background:var(--dim);position:absolute;bottom:-20px}
.s1-instructor .leg-l{left:2px}
.s1-instructor .leg-r{right:2px}
.s1-classmate{position:absolute;top:48%;left:55%;cursor:pointer}
.s1-classmate .head{width:20px;height:20px;border-radius:50%;border:2px solid var(--dim);margin:0 auto;animation:classmateSwayHead 1.8s ease-in-out infinite}
.s1-classmate .body-wrap{animation:classmateSwayBody 1.8s ease-in-out infinite}
@keyframes classmateSwayHead{0%,100%{transform:rotate(-10deg) translateX(-3px)}30%{transform:rotate(8deg) translateX(4px)}60%{transform:rotate(-6deg) translateX(-2px)}85%{transform:rotate(12deg) translateX(5px)}}
@keyframes classmateSwayBody{0%,100%{transform:rotate(-6deg) translateX(-2px)}30%{transform:rotate(5deg) translateX(3px)}60%{transform:rotate(-4deg) translateX(-1px)}85%{transform:rotate(8deg) translateX(4px)}}
.s1-classmate .body-line{width:2px;height:32px;background:var(--dim);margin:0 auto}
.s1-classmate .arms{width:24px;height:2px;background:var(--dim);margin:-24px auto 0}
.s1-classmate .legs{display:flex;justify-content:center;gap:6px;margin-top:14px}
.s1-classmate .leg-l,.s1-classmate .leg-r{width:2px;height:20px;background:var(--dim)}
.s1-self{position:absolute;top:50%;left:38%;cursor:pointer}
.s1-self .head{width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);margin:0 auto}
.s1-self .body-line{width:2px;height:32px;background:var(--accent);margin:0 auto}
.s1-self .arms{width:24px;height:2px;background:var(--accent);margin:-24px auto 0}
.s1-self .legs{display:flex;justify-content:center;gap:6px;margin-top:14px}
.s1-self .leg-l,.s1-self .leg-r{width:2px;height:20px;background:var(--accent)}
.s1-bg-group{position:absolute;top:45%;right:8%;display:flex;gap:14px;cursor:pointer;opacity:.4}
.s1-bg-figure .head{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--dim);margin:0 auto}
.s1-bg-figure .body-line{width:1.5px;height:22px;background:var(--dim);margin:0 auto}

/* ========== SCENE 2 ========== */
#scene2 .scene-canvas{background:linear-gradient(180deg,#1e1c1a 0%,#22201e 30%,#252320 50%,#1e1e1a 100%)}
/* 中间对战线 — 两排之间的分界 */
#scene2 .scene-canvas::before{content:'';position:absolute;top:48%;left:3%;width:94%;height:2px;background:rgba(196,149,106,.15)}
/* 地面弧线光 */
#scene2 .scene-canvas::after{content:'';position:absolute;bottom:12%;left:50%;transform:translateX(-50%);width:70%;height:40px;border-bottom:1px solid rgba(196,149,106,.1);border-radius:0 0 50% 50%}
.s2-fig{display:flex;flex-direction:column;align-items:center}
.s2-fig .hd{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--dim);margin-bottom:2px}
.s2-fig .bd{width:1.5px;height:20px;background:var(--dim)}
.s2-leader{position:absolute;top:50%;left:15%;cursor:pointer}
.s2-leader .hd{width:22px;height:22px;border-radius:50%;border:2px solid var(--accent);margin:0 auto}
.s2-leader .bd{width:2px;height:30px;background:var(--accent);margin:0 auto}
.s2-tall-guy{position:absolute;top:48%;right:15%;cursor:pointer;opacity:.7}
.s2-tall-guy .hd{width:20px;height:20px;border-radius:50%;border:2px solid var(--dim);margin:0 auto}
.s2-tall-guy .bd{width:2px;height:40px;background:var(--dim);margin:0 auto}
.s2-enemy-group{position:absolute;top:20%;left:50%;transform:translateX(-50%);cursor:pointer}
.s2-self{position:absolute;bottom:28%;left:42%;cursor:pointer}
.s2-self .hd{width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);margin:0 auto}
.s2-self .bd{width:2px;height:28px;background:var(--accent);margin:0 auto}
.s2-roommate{position:absolute;bottom:28%;right:22%;cursor:pointer;opacity:.6}
.s2-roommate .hd{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--dim);margin:0 auto}
.s2-roommate .bd{width:1.5px;height:22px;background:var(--dim);margin:0 auto}

/* ========== SCENE 3 ========== */
#scene3 .scene-canvas{background:linear-gradient(180deg,#1e1e1a 0%,#1a1a18 40%,#1c1c18 100%)}
/* 两侧建筑/旗杆轮廓 */
#scene3 .scene-canvas::before{content:'';position:absolute;top:5%;left:0;width:100%;height:50px;opacity:.25;background:linear-gradient(90deg,transparent 3%,#5a5a55 3%,#5a5a55 8%,transparent 8%,transparent 12%,#5a5a55 12%,#5a5a55 14%,transparent 14%,transparent 86%,#5a5a55 86%,#5a5a55 88%,transparent 88%,transparent 92%,#5a5a55 92%,#5a5a55 97%,transparent 97%)}
/* 阅兵场地面线 */
#scene3 .scene-canvas::after{content:'';position:absolute;bottom:28%;left:5%;width:90%;height:2px;background:rgba(196,149,106,.12)}
.s3-instructor{position:absolute;top:20%;left:50%;transform:translateX(-50%);cursor:pointer}
.s3-instructor .hd{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--dim);margin:0 auto}
.s3-instructor .bd{width:2.5px;height:40px;background:var(--dim);margin:0 auto}
.s3-instructor .arms{width:40px;height:2px;background:var(--dim);margin:-30px auto 0}
.s3-self{position:absolute;top:50%;left:50%;transform:translateX(-50%);cursor:pointer}
.s3-self .hd{width:20px;height:20px;border-radius:50%;border:2px solid var(--accent);margin:0 auto}
.s3-self .bd{width:2px;height:32px;background:var(--accent);margin:0 auto}
.s3-self .arms{width:24px;height:2px;background:var(--accent);margin:-24px auto 0}
.s3-roommate{position:absolute;top:52%;left:30%;cursor:pointer;opacity:.6}
.s3-roommate .hd{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--dim);margin:0 auto}
.s3-roommate .bd{width:1.5px;height:24px;background:var(--dim);margin:0 auto}

/* ---- RHYTHM GAME ---- */
#rhythm-game{position:absolute;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:300;display:none;flex-direction:column;align-items:center}
#rhythm-game.active{display:flex}
.rhythm-track{position:relative;width:80%;max-width:700px;height:70px;margin-top:18%;border-bottom:2px solid var(--dimmer)}
.rhythm-hitzone{position:absolute;bottom:-2px;left:18%;width:40px;height:6px;background:var(--accent);border-radius:3px}
.rhythm-note{position:absolute;bottom:4px;width:18px;height:18px;border-radius:50%;background:var(--accent);opacity:.9;transition:opacity .15s}
.rhythm-note.hit{opacity:0;transform:scale(1.5);transition:all .2s}
.rhythm-score{text-align:center;margin-top:10px;font-size:.95em;color:var(--dim)}
.rhythm-score .count{color:var(--accent);font-size:1.4em}
.rhythm-judgement{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:1.8em;font-weight:bold;opacity:0;transition:all .3s;pointer-events:none;z-index:10}
.rhythm-judgement.show{opacity:1}
.rhythm-judgement.perfect{color:#e8c87a}
.rhythm-judgement.good{color:var(--accent)}
.rhythm-judgement.miss{color:#885544}
.rhythm-tap-area{position:absolute;bottom:5%;right:8%;width:90px;height:90px;border-radius:50%;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:.85em;color:var(--dim);cursor:pointer;transition:all .15s}
.rhythm-tap-area:active{background:rgba(196,149,106,.15);transform:scale(.95)}
.rhythm-char{position:absolute;top:12%;left:12%;font-size:2.5em;animation:walkCycle 0.5s ease infinite}
.rhythm-progress{width:80%;max-width:700px;height:6px;background:var(--dimmer);border-radius:3px;margin-top:12px;overflow:hidden}
.rhythm-progress-bar{height:100%;background:var(--accent);width:0%;transition:width .3s}

/* ---- ENDING ---- */
#ending{background:var(--bg);text-align:center;padding:2em 4em;overflow-y:auto;justify-content:flex-start;padding-top:6vh}
#ending .regret-line{font-size:1em;color:var(--dim);line-height:2;margin-bottom:1.2em;opacity:0}
#ending .regret-line.show{animation:typeIn .8s ease forwards}
#ending .reveal{font-size:.95em;color:var(--accent);line-height:2;margin:1.5em 0;opacity:0}
#ending .reveal.show{animation:typeIn 1s ease forwards}
#ending .end-title{font-size:1.8em;color:var(--accent);letter-spacing:.15em;margin:2em 0 .5em;opacity:0}
#ending .end-title.show{animation:typeIn 1s ease forwards}
#ending .end-sub{font-size:.9em;color:var(--dim);letter-spacing:.3em;margin-bottom:2em;opacity:0}
#ending .end-sub.show{animation:typeIn 1s ease forwards}
#ending .restart-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:12px 40px;font-size:1em;cursor:pointer;letter-spacing:.15em;border-radius:2px;transition:all .3s;opacity:0}
#ending .restart-btn.show{opacity:1}
#ending .restart-btn:hover{background:var(--accent);color:var(--bg)}

/* ---- UTILS ---- */
.clickable{cursor:pointer;transition:transform .2s}
.clickable:hover{transform:scale(1.05)}
.hidden{display:none!important}

/* ---- ESTABLISHING SHOT ---- */
#establishing-shot{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;background:#1a1a1a;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 1s}
#establishing-shot.show{opacity:1;pointer-events:auto}
#establishing-shot img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
#establishing-shot .es-title{position:relative;z-index:2;font-size:1.3em;color:var(--text);letter-spacing:.2em;text-shadow:0 2px 20px rgba(0,0,0,.8);opacity:0;transition:opacity 1.2s .5s}
#establishing-shot.show .es-title{opacity:.85}

/* ---- GAME CONTAINER ---- */
#game-container{
  position:fixed;top:0;left:0;
  width:100vw;height:100vh;
  overflow:hidden;
  transform-origin:center center;
  transition:transform .3s ease;
}

</style>
</head>
<body>
<div id="game-container">

<!-- SOUND TOGGLE -->
<div id="sound-toggle" onclick="SFX.toggle()"><span class="icon-on"></span></div>
<div id="establishing-shot"><img id="es-img" src="" alt=""><div class="es-title" id="es-title"></div></div>
<!-- EXPLORE HINT -->
<div id="explore-hint">
  <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
  <span class="hint-countdown"></span>
</div>

<div id="game">
  <!-- TITLE -->
  <div id="title-screen" class="scene active">
    <h1>那个谁</h1>
    <p class="subtitle">军 训 篇</p>
    <button class="start-btn" onclick="startOpening()">开 始</button>
  </div>
  <!-- OPENING -->
  <div id="opening-screen" class="scene"></div>
  <!-- TRANSITION -->
  <div id="transition-screen" class="scene"></div>
  <!-- SCENE 1 -->
  <div id="scene1" class="scene">
    <div class="scene-canvas">
      <div class="s1-sun clickable" data-el="sun"></div>
      <div class="s1-ground" data-el="ground"></div>
      <div class="s1-instructor clickable" data-el="instructor">
        <div class="head"></div><div class="body-line"></div><div class="arms"></div>
        <div class="legs"><div class="leg-l"></div><div class="leg-r"></div></div>
      </div>
      <div class="s1-classmate clickable" data-el="classmate">
        <div class="head" data-part="head"></div>
        <div class="body-wrap">
          <div class="body-line" data-part="body"></div>
          <div class="arms"></div>
          <div class="legs"><div class="leg-l"></div><div class="leg-r"></div></div>
        </div>
      </div>
      <div class="s1-self clickable" data-el="self">
        <div class="head"></div><div class="body-line"></div><div class="arms"></div>
        <div class="legs"><div class="leg-l"></div><div class="leg-r"></div></div>
      </div>
      <div class="s1-bg-group clickable" data-el="bggroup">
        <div class="s1-bg-figure"><div class="head"></div><div class="body-line"></div></div>
        <div class="s1-bg-figure"><div class="head"></div><div class="body-line"></div></div>
        <div class="s1-bg-figure"><div class="head"></div><div class="body-line"></div></div>
      </div>
      <!-- 蚂蚁 -->
      <div class="ant ant1"><div class="ant-body"></div><div class="ant-legs"></div></div>
      <div class="ant ant2"><div class="ant-body"></div><div class="ant-legs"></div></div>
      <div class="ant ant3"><div class="ant-body"></div><div class="ant-legs"></div></div>
    </div>

<script>
// ============================================================
//  ORIENTATION ENFORCEMENT — 始终保持横屏布局
//  portrait → rotate(90deg) 强制横屏
//  landscape-primary → 不处理
//  landscape-secondary → rotate(180deg) 翻转回正
// ============================================================
function handleOrientation() {
  const c = document.getElementById('game-container');
  if (!c) return;

  let type = '';
  if (screen.orientation && screen.orientation.type) {
    type = screen.orientation.type;
  } else {
    // 兼容旧浏览器：用窗口尺寸判断
    type = (window.innerWidth > window.innerHeight) ? 'landscape-primary' : 'portrait-primary';
  }

  if (type === 'portrait-primary' || type === 'portrait-secondary') {
    // 竖屏 → 顺时针旋转90度强制横屏
    c.style.width = '100vh';
    c.style.height = '100vw';
    c.style.left = '50%';
    c.style.top = '50%';
    c.style.transform = 'translate(-50%,-50%) rotate(90deg)';
  } else if (type === 'landscape-secondary') {
    // 倒置横屏 → 旋转180度
    c.style.width = '100vw';
    c.style.height = '100vh';
    c.style.left = '0';
    c.style.top = '0';
    c.style.transform = 'rotate(180deg)';
  } else {
    // 正常横屏 → 不旋转
    c.style.width = '100vw';
    c.style.height = '100vh';
    c.style.left = '0';
    c.style.top = '0';
    c.style.transform = '';
  }
}

handleOrientation();
window.addEventListener('resize', handleOrientation);
if (screen.orientation) {
  screen.orientation.addEventListener('change', handleOrientation);
} else {
  window.addEventListener('orientationchange', handleOrientation);
}

// ============================================================
//  NARRATION SEQUENCE SYSTEM — 点击翻页模式
// ============================================================
const NarSeq = {
  queue: [],
  running: false,
  typingTimer: null,
  skipRequested: false,
  onComplete: null,
  
  start(items, onComplete) {
    this.queue = items.slice();
    this.onComplete = onComplete;
    this.running = true;
    this._processNext();
  },
  
  stop() {
    if (this.typingTimer) { clearInterval(this.typingTimer); this.typingTimer = null; }
    this.running = false;
    this.queue = [];
  },
  
  _processNext() {
    if (!this.running || this.queue.length === 0) {
      this.running = false;
      if (this.onComplete) { const cb = this.onComplete; this.onComplete = null; cb(); }
      return;
    }
    const item = this.queue.shift();
    const { sceneId, text } = item;
    
    // Get narration element
    let n;
    if (sceneId === 'opening') {
      const el = document.getElementById('opening-screen');
      const p = document.createElement('p');
      el.appendChild(p);
      n = p;
      this._typewrite(n, text, () => { addTimer(() => this._processNext(), 1000); }, true);
    } else if (sceneId === 'transition') {
      const el = document.getElementById('transition-screen');
      const p = document.createElement('p');
      el.appendChild(p);
      n = p;
      this._typewrite(n, text, () => { addTimer(() => this._processNext(), 1000); }, true);
    } else {
      n = document.getElementById('nar' + sceneId);
      if (!n) { this._processNext(); return; }
      this._typewrite(n, text, () => { addTimer(() => this._processNext(), 1000); }, false);
    }
  },
  
  _typewrite(el, text, onDone, isP) {
    if (isP) {
      el.textContent = '';
      el.classList.add('show');
    } else {
      el.textContent = '';
      el.classList.add('show');
    }
    
    this.skipRequested = false;
    let i = 0;
    const self = this;
    
    const clickHandler = function(e) {
      if (e.target.closest('.choices') || e.target.closest('#sound-toggle') || e.target.closest('#rhythm-game')) return;
      self.skipRequested = true;
    };
    
    setTimeout(() => {
      document.addEventListener('click', clickHandler);
    }, 100);
    
    const cleanup = () => {
      if (this.typingTimer) { clearInterval(this.typingTimer); this.typingTimer = null; }
      document.removeEventListener('click', clickHandler);
    };
    
    this.typingTimer = setInterval(() => {
      if (this.skipRequested || i >= text.length) {
        cleanup();
        el.textContent = text;
        onDone();
      } else {
        el.textContent += text[i];
        i++;
      }
    }, 60);
  }
};

// ============================================================
//  AUDIO ENGINE — Web Audio API 合成音效
// ============================================================
const SFX = {
  ctx: null,
  muted: false,
  ambientNodes: [],
  masterGain: null,

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.35;
    this.masterGain.connect(this.ctx.destination);
  },

  toggle() {
    this.init();
    this.muted = !this.muted;
    const btn = document.getElementById('sound-toggle');
    btn.querySelector('span').className = this.muted ? 'icon-off' : 'icon-on';
    btn.classList.toggle('muted', this.muted);
    if (this.muted) { this.stopAllAmbient(); }
    else { this._restoreAmbientForCurrentScene(); }
  },

  _now() { return this.ctx ? this.ctx.currentTime : 0; },

  // ---- Core oscillator helper ----
  _tone(freq, type, attack, decay, vol, dest) {
    if (this.muted || !this.ctx) return;
    const t = this._now();
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.3, t + (attack || 0.01));
    g.gain.exponentialRampToValueAtTime(0.001, t + (decay || 0.3));
    osc.connect(g);
    g.connect(dest || this.masterGain);
    osc.start(t);
    osc.stop(t + (decay || 0.3) + 0.05);
  },

  // ---- Noise buffer helper ----
  _noise(duration, filterFreq, filterType, vol, dest) {
    if (this.muted || !this.ctx) return;
    const t = this._now();
    const sr = this.ctx.sampleRate;
    const len = sr * duration;
    const buf = this.ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = filterType || 'lowpass';
    filt.frequency.setValueAtTime(filterFreq || 800, t);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(vol || 0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(filt);
    filt.connect(g);
    g.connect(dest || this.masterGain);
    src.start(t);
    src.stop(t + duration + 0.05);
    return { src, filt, g };
  },

  // ==================== SOUND EFFECTS ====================

  // 点击元素 — 清脆的"叮"
  ding() {
    this.init();
    if (this.muted) return;
    this._tone(1100, 'sine', 0.005, 0.18, 0.12);
    this._tone(1650, 'sine', 0.005, 0.12, 0.06);
  },

  // 选择确认 — 低沉的"咚"
  thud() {
    this.init();
    if (this.muted) return;
    this._tone(110, 'sine', 0.01, 0.5, 0.25);
    this._tone(80, 'triangle', 0.005, 0.35, 0.15);
    this._noise(0.08, 200, 'lowpass', 0.06);
  },

  // 场景切换 — 极轻柔气息感过渡（0.6秒微音量低通噪声）
  transition() {
    this.init();
    if (this.muted) return;
    const t = this._now();
    const sr = this.ctx.sampleRate;
    const dur = 0.6;
    const len = sr * dur;
    const buf = this.ctx.createBuffer(1, len, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    const filt = this.ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 250;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.015, t + 0.15);
    g.gain.linearRampToValueAtTime(0, t + dur);
    src.connect(filt); filt.connect(g); g.connect(this.masterGain);
    src.start(t); src.stop(t + dur + 0.05);
  },

  // 开场文字 — 轻柔环境音
  opening() {
    this.init();
    if (this.muted) return;
    // 轻柔低频无人机音
    this._startAmbient('opening');
  },

  // 站军姿 — 风声 + 远处隐约口号感
  scene1Ambient() {
    this.init();
    this.stopAllAmbient();
    if (this.muted) return;
    this._startAmbient('scene1');
  },

  // 拉歌 — 隐约人群声/掌声节奏
  scene2Ambient() {
    this.init();
    this.stopAllAmbient();
    if (this.muted) return;
    this._startAmbient('scene2');
  },

  // 选拔 — 紧张低频
  scene3Ambient() {
    this.init();
    this.stopAllAmbient();
    if (this.muted) return;
    this._startAmbient('scene3');
  },

  // 节奏游戏 Perfect
  rhythmPerfect() {
    this.init();
    if (this.muted) return;
    this._tone(1320, 'sine', 0.005, 0.2, 0.18);
    this._tone(1760, 'sine', 0.01, 0.15, 0.1);
    this._tone(880, 'triangle', 0.005, 0.12, 0.08);
  },

  // 节奏游戏 Good
  rhythmGood() {
    this.init();
    if (this.muted) return;
    this._tone(880, 'sine', 0.005, 0.18, 0.14);
    this._tone(660, 'triangle', 0.008, 0.12, 0.07);
  },

  // 节奏游戏 Miss
  rhythmMiss() {
    this.init();
    if (this.muted) return;
    this._tone(180, 'sawtooth', 0.01, 0.25, 0.1);
    this._noise(0.12, 300, 'lowpass', 0.06);
  },

  // 节奏游戏节拍器滴答（每个note出现时）
  rhythmTick() {
    this.init();
    if (this.muted) return;
    this._tone(600, 'square', 0.002, 0.04, 0.04);
  },

  // 结算页 — 安静环境pad
  endingAmbient() {
    this.init();
    this.stopAllAmbient();
    if (this.muted) return;
    this._startAmbient('ending');
  },

  // 通过判定
  rhythmPass() {
    this.init();
    if (this.muted) return;
    const t = this._now();
    [523, 659, 784, 1047].forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      g.gain.setValueAtTime(0, t + i * 0.12);
      g.gain.linearRampToValueAtTime(0.12, t + i * 0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.4);
      osc.connect(g); g.connect(this.masterGain);
      osc.start(t + i * 0.12);
      osc.stop(t + i * 0.12 + 0.5);
    });
  },

  // 失败判定
  rhythmFail() {
    this.init();
    if (this.muted) return;
    this._tone(220, 'sine', 0.02, 0.8, 0.12);
    this._tone(185, 'sine', 0.05, 1.0, 0.08);
  },

  // ==================== AMBIENT SYSTEM ====================
  _startAmbient(type) {
    return; // BGM disabled — interactive SFX only
    if (!this.ctx || this.muted) return;
    this.stopAllAmbient();

    if (type === 'opening') {
      // 极轻柔的 Drone
      const t = this._now();
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = 110;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.04, t + 2);
      osc.connect(g); g.connect(this.masterGain);
      osc.start(t);
      this.ambientNodes.push({ src: osc, g, stop: () => { try { g.gain.exponentialRampToValueAtTime(0.001, this._now() + 1); osc.stop(this._now() + 1.1); } catch(e){} } });
    }
    else if (type === 'scene1') {
      // 风声 — 持续低通噪声
      const sr = this.ctx.sampleRate;
      const len = sr * 8;
      const buf = this.ctx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'lowpass'; filt.frequency.value = 400;
      const g = this.ctx.createGain();
      const t = this._now();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.06, t + 2);
      src.connect(filt); filt.connect(g); g.connect(this.masterGain);
      src.start(t);
      this.ambientNodes.push({ src, g, stop: () => { try { g.gain.exponentialRampToValueAtTime(0.001, this._now() + 1); src.stop(this._now() + 1.1); } catch(e){} } });
      // 偶尔的口号感 — 极低频脉冲
      const osc2 = this.ctx.createOscillator();
      const g2 = this.ctx.createGain();
      osc2.type = 'sine'; osc2.frequency.value = 85;
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.025, t + 3);
      osc2.connect(g2); g2.connect(this.masterGain);
      osc2.start(t);
      this.ambientNodes.push({ src: osc2, g: g2, stop: () => { try { g2.gain.exponentialRampToValueAtTime(0.001, this._now() + 1); osc2.stop(this._now() + 1.1); } catch(e){} } });
    }
    else if (type === 'scene2') {
      // 人群嗡嗡声
      const sr = this.ctx.sampleRate;
      const len = sr * 8;
      const buf = this.ctx.createBuffer(1, len, sr);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
      const src = this.ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const filt = this.ctx.createBiquadFilter();
      filt.type = 'bandpass'; filt.frequency.value = 500; filt.Q.value = 0.8;
      const g = this.ctx.createGain();
      const t = this._now();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05, t + 1.5);
      src.connect(filt); filt.connect(g); g.connect(this.masterGain);
      src.start(t);
      this.ambientNodes.push({ src, g, stop: () => { try { g.gain.exponentialRampToValueAtTime(0.001, this._now() + 1); src.stop(this._now() + 1.1); } catch(e){} } });
      // 节奏性脉冲 — 模拟远处拍手
      const interval = 0.8;
      const pulseCount = 20;
      for (let i = 0; i < pulseCount; i++) {
        const osc = this.ctx.createOscillator();
        const gp = this.ctx.createGain();
        osc.type = 'triangle'; osc.frequency.value = 300 + Math.random() * 100;
        const pt = t + i * interval;
        gp.gain.setValueAtTime(0, pt);
        gp.gain.linearRampToValueAtTime(0.03, pt + 0.01);
        gp.gain.exponentialRampToValueAtTime(0.001, pt + 0.08);
        osc.connect(gp); gp.connect(this.masterGain);
        osc.start(pt); osc.stop(pt + 0.1);
      }
      this.ambientNodes.push({ stop: () => {} }); // placeholder
    }
    else if (type === 'scene3') {
      // 紧张低频 drone
      const t = this._now();
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = 65;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.05, t + 2);
      osc.connect(g); g.connect(this.masterGain);
      osc.start(t);
      this.ambientNodes.push({ src: osc, g, stop: () => { try { g.gain.exponentialRampToValueAtTime(0.001, this._now() + 1); osc.stop(this._now() + 1.1); } catch(e){} } });
      // 微弱心跳
      const beat = 1.1;
      for (let i = 0; i < 16; i++) {
        const o2 = this.ctx.createOscillator();
        const g2 = this.ctx.createGain();
        o2.type = 'sine'; o2.frequency.value = 50;
        const bt = t + i * beat;
        g2.gain.setValueAtTime(0, bt);
        g2.gain.linearRampToValueAtTime(0.04, bt + 0.04);
        g2.gain.exponentialRampToValueAtTime(0.001, bt + 0.2);
        o2.connect(g2); g2.connect(this.masterGain);
        o2.start(bt); o2.stop(bt + 0.25);
      }
      this.ambientNodes.push({ stop: () => {} });
    }
    else if (type === 'ending') {
      // 柔和 pad — 多个缓慢正弦
      const t = this._now();
      [174, 220, 261, 330].forEach(f => {
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = f;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.025, t + 3);
        osc.connect(g); g.connect(this.masterGain);
        osc.start(t);
        this.ambientNodes.push({ src: osc, g, stop: () => { try { g.gain.exponentialRampToValueAtTime(0.001, this._now() + 2); osc.stop(this._now() + 2.1); } catch(e){} } });
      });
    }
  },

  stopAllAmbient() {
    this.ambientNodes.forEach(n => { try { n.stop(); } catch(e){} });
    this.ambientNodes = [];
  },

  _restoreAmbientForCurrentScene() {
    return; // BGM disabled
    // Re-apply ambient if there's an active scene
    const active = document.querySelector('.scene.active');
    if (!active) return;
    const id = active.id;
    if (id === 'scene1') this.scene1Ambient();
    else if (id === 'scene2') this.scene2Ambient();
    else if (id === 'scene3') this.scene3Ambient();
    else if (id === 'ending') this.endingAmbient();
    else if (id === 'opening-screen') this.opening();
  }
};

//  GAME STATE
// ============================================================
const S = {
  tags: { bold:0, support:0, quiet:0 },
  s1Choice: null,
  s2Choice: null,
  s3Choice: null,
  rhythmResult: null,
  clickCounts: {},
  timers: []
};

function clearTimers(){ S.timers.forEach(t=>clearTimeout(t)); S.timers=[]; NarSeq.stop(); }
function addTimer(fn,ms){ const t=setTimeout(fn,ms); S.timers.push(t); return t; }

function showEstablishingShot(imageKey, title, duration, callback) {
  const es = document.getElementById('establishing-shot');
  const img = document.getElementById('es-img');
  const ttl = document.getElementById('es-title');
  img.src = ES_IMAGES[imageKey] || '';
  ttl.textContent = title || '';
  // Fade in
  requestAnimationFrame(() => {
    es.classList.add('show');
  });
  // After duration, fade out then callback
  addTimer(() => {
    es.classList.remove('show');
    addTimer(() => {
      if (callback) callback();
    }, 1000); // wait for fade-out transition
  }, duration || 3000);
}

// ============================================================
//  SCENE MANAGEMENT
// ============================================================
function showScreen(id){
  document.querySelectorAll('.scene').forEach(s=>{s.classList.remove('active');s.style.opacity=0});
  const el=document.getElementById(id);
  el.classList.add('active');
  setTimeout(()=>el.style.opacity=1,20);
}
function switchScene(id,cb){
  SFX.transition();
  const cur=document.querySelector('.scene.active');
  if(cur){cur.style.opacity=0;addTimer(()=>{cur.classList.remove('active');showScreen(id);if(cb)cb()},600)}
  else{showScreen(id);if(cb)cb()}
}

// ============================================================
//  UI HELPERS
// ============================================================
function showBubble(sceneId,text,x,y){
  SFX.ding();
  const b=document.getElementById('bubble'+sceneId);
  b.textContent=text;
  b.style.left=Math.min(Math.max(x||'50%','10%'),'75%');
  b.style.top=y||'30%';
  b.classList.add('show');
  addTimer(()=>b.classList.remove('show'),2800);
}

function showNar(sceneId,text,dur){
  const n=document.getElementById('nar'+sceneId);
  n.textContent=text;
  n.classList.add('show');
  addTimer(()=>n.classList.remove('show'),dur||3000);
}

function showChoices(sceneId,options,onPick){
  hideExploreHint();
  const c=document.getElementById('choices'+sceneId);
  c.innerHTML='';
  options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.textContent=opt;
    btn.onmouseenter=()=>SFX.ding();
    btn.onclick=()=>{
      SFX.thud();
      c.classList.remove('show');
      addTimer(()=>{c.innerHTML=''},400);
      onPick(i);

let _exploreInterval=null;
function showExploreHint(seconds){
  hideExploreHint();
  const hint=document.getElementById('explore-hint');
  const cd=hint.querySelector('.hint-countdown');
  let remaining=seconds;
  cd.textContent=remaining+'s';
  hint.classList.add('show');
  hint.classList.remove('fade-out');
  _exploreInterval=setInterval(()=>{
    remaining--;
    if(remaining<=0){
      hideExploreHint();
    }else{
      cd.textContent=remaining+'s';
    }
  },1000);
}
function hideExploreHint(){
  if(_exploreInterval){clearInterval(_exploreInterval);_exploreInterval=null;}
  const hint=document.getElementById('explore-hint');
  hint.classList.remove('show');
  hint.classList.add('fade-out');
}

let rhythmState={notes:[],current:0,score:0,combo:0,perfect:0,good:0,miss:0,running:false,noteTimes:[],startTime:0};

function startRhythmGame(){
  SFX.stopAllAmbient();
  const rg=document.getElementById('rhythm-game');
  rg.classList.add('active');
  rhythmState={notes:[],current:0,score:0,combo:0,perfect:0,good:0,miss:0,running:true,noteTimes:[],startTime:0};
  const interval=850;
  const track=document.getElementById('rhythm-track');
  track.querySelectorAll('.rhythm-note').forEach(n=>n.remove());
  for(let i=0;i<16;i++){
    rhythmState.noteTimes.push(i*interval+2000);
  }
  rhythmState.startTime=performance.now();
  rhythmState.noteTimes.forEach((t,i)=>{
    addTimer(()=>{
      if(!rhythmState.running)return;
      SFX.rhythmTick();
      const note=document.createElement('div');
      note.className='rhythm-note';
      note.style.right='-20px';
      note.dataset.idx=i;
      track.appendChild(note);
      rhythmState.notes.push({el:note,spawnTime:performance.now(),hit:false,idx:i});
      const hitX=track.offsetWidth*0.18;
      const startX=track.offsetWidth;
      const duration=1200;
      const startMs=performance.now();
      function moveNote(){
        if(!rhythmState.running||rhythmState.notes[i].hit){return}
        const elapsed=performance.now()-startMs;
        const progress=Math.min(elapsed/duration,1);
        const x=startX+(hitX-startX)*progress;
        note.style.right='auto';
        note.style.left=x+'px';
        if(progress<1)requestAnimationFrame(moveNote);
        else if(!rhythmState.notes[i].hit){handleMiss(i)}
      }
      requestAnimationFrame(moveNote);
    },t);
  });
  addTimer(()=>{
    if(rhythmState.running){endRhythmGame()}
  },rhythmState.noteTimes[15]+2000);
  document.getElementById('rhythm-tap').onclick=handleTap;
  updateRhythmUI();
}

function handleTap(){
  if(!rhythmState.running)return;
  let best=null,bestDist=Infinity;
  rhythmState.notes.forEach((n,i)=>{
    if(n.hit)return;
    const el=n.el;
    const track=document.getElementById('rhythm-track');
    const hitZone=track.offsetWidth*0.18+20;
    const noteLeft=parseFloat(el.style.left)||track.offsetWidth;
    const dist=Math.abs(noteLeft-hitZone);
    if(dist<bestDist){bestDist=dist;best=i}
  });
  if(best===null)return;
  const hitZone=document.getElementById('rhythm-track').offsetWidth*0.18+20;
  const noteLeft=parseFloat(rhythmState.notes[best].el.style.left)||document.getElementById('rhythm-track').offsetWidth;
  const diff=Math.abs(noteLeft-hitZone);
  rhythmState.notes[best].hit=true;
  rhythmState.notes[best].el.classList.add('hit');
  if(diff<35){
    rhythmState.perfect++;rhythmState.score++;rhythmState.combo++;
    showJudge('Perfect','perfect');
    SFX.rhythmPerfect();
  }else if(diff<70){
    rhythmState.good++;rhythmState.score++;rhythmState.combo++;
    showJudge('Good','good');
    SFX.rhythmGood();
  }else{
    handleMiss(best);return;
  }
  updateRhythmUI();
}

function handleMiss(i){
  if(rhythmState.notes[i].hit)return;
  rhythmState.notes[i].hit=true;
  rhythmState.notes[i].el.classList.add('hit');
  rhythmState.miss++;rhythmState.combo=0;
  showJudge('Miss','miss');
  SFX.rhythmMiss();
  updateRhythmUI();
}

function showJudge(text,cls){
  const j=document.getElementById('rhythm-judge');
  j.textContent=text;j.className='rhythm-judgement show '+cls;
  addTimer(()=>j.classList.remove('show'),500);
}

function updateRhythmUI(){
  document.getElementById('rhythm-score-num').textContent=rhythmState.score;
  document.getElementById('rhythm-combo').textContent=rhythmState.combo;
  const total=rhythmState.perfect+rhythmState.good+rhythmState.miss;
  document.getElementById('rhythm-bar').style.width=(total/16*100)+'%';
}

function endRhythmGame(){
  rhythmState.running=false;
  const passed=rhythmState.perfect+rhythmState.good>=12;
  S.rhythmResult=passed?'pass':'fail';
  document.getElementById('rhythm-game').classList.remove('active');
  if(passed)SFX.rhythmPass(); else SFX.rhythmFail();
  addTimer(()=>{
    if(passed)scene3RhythmPass();
    else scene3RhythmFail();
  },800);
}

function showEnding(){
  SFX.stopAllAmbient();
  switchScene('ending',()=>{
    SFX.endingAmbient();
    const el=document.getElementById('ending');
    el.innerHTML='';
    el.scrollTop=0;
    let delay=500;
    const comboRegret=getComboRegret();
    if(comboRegret){
      addLine(el,comboRegret,'regret-line',delay);delay+=3000;
    }
    const s1Regret=getS1Regret();
    addLine(el,s1Regret,'regret-line',delay);delay+=3000;
    const genRegrets=[
      '军训结束那天，你和教官合了影。你站在后排。照片里你笑得不太自然——但你确实在笑',
      '你后来翻过军训的照片。你记得那天很热。但你不记得谁站在你旁边'
    ];
    addLine(el,genRegrets[Math.floor(Math.random()*genRegrets.length)],'regret-line',delay);delay+=3500;
    const div=document.createElement('p');div.textContent='— — —';div.className='regret-line';div.style.color='var(--dimmer)';
    el.appendChild(div);addTimer(()=>div.classList.add('show'),delay);delay+=2000;
    const reveals=getReveals();
    reveals.forEach(r=>{
      addLine(el,r,'reveal',delay);delay+=3000;
    });
    delay+=1000;
    addLine(el,'你终于看清了自己。','reveal',delay);delay+=3500;
    const t1=document.createElement('p');t1.className='end-title';t1.textContent='那个谁';el.appendChild(t1);
    addTimer(()=>t1.classList.add('show'),delay);delay+=800;
    const t2=document.createElement('p');t2.className='end-sub';t2.textContent='军 训 篇 · 完';el.appendChild(t2);
    addTimer(()=>t2.classList.add('show'),delay);delay+=800;
    const btn=document.createElement('button');btn.className='restart-btn';btn.textContent='再 玩 一 次';
    btn.onclick=()=>{ SFX.stopAllAmbient(); location.reload(); };
    el.appendChild(btn);
    addTimer(()=>btn.classList.add('show'),delay);
  });
}

function addLine(container,text,cls,delay){
  const p=document.createElement('p');p.className=cls;p.textContent=text;
  container.appendChild(p);
  addTimer(()=>p.classList.add('show'),delay);
}

function getComboRegret(){
  const s1=S.s1Choice,s2=S.s2Choice,s3=S.s3Choice;
  const map={
    'AAC':'你一直站在最前面。后来你累了，但你不好意思退',
    'AAF':'你出了两次头，第三次没接住。有人说你"虎头蛇尾"',
    'CAC':'你在最后一刻站出来了。但没人知道你之前去了哪里',
    'CCC':'三天，你什么都没说。后来你想了想，你觉得那是你最安静的三天',
    'BCF':'你扶过一次人。但后来很多次你都没伸手。你在想哪次更像你',
    'ACA':'你站出来了，又安静了，又站出来了。别人看不懂你，你自己也看不懂'
  };
  const s3Key=s3==='A'?(S.rhythmResult==='pass'?'C':'F'):(s3==='B'?'C':'C');
  const lookup=(s1||'C')+(s2||'C')+s3Key;
  return map[lookup]||null;
}

function getS1Regret(){
  const map={
    'A':'你报告了教官。同学后来好了。但他看你的眼神变了——他不知道是该感谢你，还是觉得你多事',
    'B':'你撑了他一把。他没说什么。但你发现你的迷彩服肩膀那块湿了——不知道是汗还是什么',
    'C':'你挪了半步。什么也没发生。但那天晚上你想：如果我没挪那半步呢'
  };
  return map[S.s1Choice]||map['C'];
}

function getReveals(){
  const r=[];
  if(S.s1Choice==='A'||S.s1Choice==='B'){
    r.push('你后来知道他叫李明。帽子上的那个"李"字，你当时差一点就读出来了。');
  }else{
    r.push('你没看清摇晃同学的脸');
  }
  if(S.s2Choice==='A'){
    r.push('他后来告诉你，那天拉歌他紧张得手心全是汗。但你站起来的那一刻，他觉得松了一口气。');
  }
  if(S.s2Choice!=='C'){
    r.push('他叫张磊。后来你们在一个食堂吃饭，他说"那天我想站出来来着"。你笑了笑，没说话。');
  }
  r.push('教官姓王。你后来在操场上遇到过他好几次。每次他都会微微点头。');
  r.push('你室友叫……你想了很久。最后你想起来了。你记得他打呼噜的声音比记得他的脸清楚。');
  return r;
}
